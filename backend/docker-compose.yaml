services:
  postgres:
    image: postgres:16
    container_name: postgres_gelo
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: "gelo-team-db"
      POSTGRES_USER: gelo_app
      POSTGRES_PASSWORD: Gelo@2026!
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_gelo
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gelo.com
      PGADMIN_DEFAULT_PASSWORD: Admin@2026
    depends_on:
      - postgres

volumes:
  pgdata: