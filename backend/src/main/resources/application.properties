spring.application.name=student-management-and-recurring-payments

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

server.port=8080

spring.profiles.active=local

api.security.token.secret=${API_SECURITY_TOKEN_SECRET}

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=Authorization,Content-Type,Cache-Control
cors.allow-credentials=true

mercadopago.access-token=${MERCADOPAGO_ACCESS_TOKEN:}
mercadopago.webhook-secret=${MERCADOPAGO_WEBHOOK_SECRET:}
mercadopago.api-base-url=${MERCADOPAGO_API_BASE_URL:https://api.mercadopago.com}
mercadopago.notification-url=${MERCADOPAGO_NOTIFICATION_URL:http://localhost:8080/api/payments/webhook/mercadopago}

logging.level.root=INFO
logging.level.br.com.geloteam.studentmanagement=DEBUG

# Se quiser silenciar logs muito verbosos do Spring ou Hibernate
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=ERROR

# opcional para gerar arquivo com os logs
logging.file.name=logs/app-boarding.log
